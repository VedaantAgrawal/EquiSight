services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: equisight
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - equisight-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: loads the committed real forecasting results
  # (forecasting/results/*.json) into Postgres, then exits. Re-run with
  # `docker compose run --rm db-loader` after a fresh `run_pipeline.py`.
  db-loader:
    build:
      context: .
      dockerfile: forecasting/Dockerfile.loader
    environment:
      DB_URL: postgresql://postgres:devpass@postgres:5432/equisight
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_URL: postgresql://postgres:devpass@postgres:5432/equisight
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      db-loader:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  equisight-postgres-data:
