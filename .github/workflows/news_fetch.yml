name: fetch-news-15m

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 13-19 * * 1-5"  # 9:00–3:59 PM ET (UTC)
    - cron: "30 20 * * 1-5"       # 4:30 PM ET final sweep

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Fetch latest news window and upsert
        env:
          DB_URL: ${{ secrets.DB_URL }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          SYMBOLS: ${{ secrets.SYMBOLS }}
          NEWS_WINDOW_HOURS: "48"     # adjust if you want
        run: python news_update.py
