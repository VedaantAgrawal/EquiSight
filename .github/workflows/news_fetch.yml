name: fetch-today-news-15m

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 13-19 * * 1-5"   # every 15 min, 13:00–19:59 UTC (9:00–3:59 ET)
    - cron: "30 20 * * 1-5"        # 4:30 PM ET sweep

jobs:
  fetch_today_news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Fetch latest news & upsert to today_news
        env:
          DB_URL: ${{ secrets.DB_URL }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          SYMBOLS: ${{ secrets.SYMBOLS }}
          NEWS_WINDOW_HOURS: "48"   # safe overlap, change if you want
          NEWS_PAGE_LIMIT: "50"
          NEWS_PAUSE_SEC: "0.2"
        run: python news_update.py
