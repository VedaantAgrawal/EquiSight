name: update-db-and-sheet-15m

on:
  schedule:
    - cron: "*/15 13-19 * * 1-5"  # every 15 min, 13:00–19:59 UTC, Mon–Fri
    - cron: "30 20 * * 1-5"       # one extra run at 20:30 UTC for the 4:30pm bar

concurrency:
  group: db-and-sheet
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Update Neon DB with latest bars
        env:
          DB_URL: ${{ secrets.DB_URL }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_DATA_FEED: ${{ secrets.ALPACA_DATA_FEED }}
          SYMBOLS: ${{ secrets.SYMBOLS }}
        run: python update.py

      - name: Update Google Sheet with today's data
        env:
          DB_URL: ${{ secrets.DB_URL }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python sheet_update.py
