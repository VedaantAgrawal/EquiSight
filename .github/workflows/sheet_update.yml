name: update-google-sheet-15m

on:
  schedule:
    # Every 15 min between 14:30 and 21:00 UTC (9:30 AM – 4:00 PM ET) Mon–Fri
    - cron: "*/15 14-20 * * 1-5"
    - cron: "30 21 * * 1-5" # Final run after close to catch last bar
  workflow_dispatch: {}     # Allow manual run

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Update Google Sheet with today's data
        env:
          DB_URL: ${{ secrets.DB_URL }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python sheet_update.py
